
<!DOCTYPE html>
<!-- v2 - CYXL CYAC CYVZ CPV7 added -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTPOnly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky-dark:   #0a0f1e;
    --sky-mid:    #0d1b3e;
    --horizon:    #0e4d8c;
    --gold:       #f0c040;
    --gold-dim:   #a07820;
    --teal:       #00d4b8;
    --teal-dim:   #007a6a;
    --white:      #f0f4ff;
    --muted:      #6b7fa8;
    --calm:       #00e676;
    --moderate:   #ffee58;
    --strong:     #ff9800;
    --severe:     #f44336;
    --card-bg:    rgba(13,27,62,0.85);
    --border:     rgba(100,140,220,0.18);
  }

  html, body { height: 100%; background: var(--sky-dark); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(14,77,140,0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,184,0.08) 0%, transparent 60%),
      linear-gradient(160deg, #0a0f1e 0%, #0d1b3e 40%, #071528 100%);
    z-index: 0; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 92% 12%, rgba(240,192,64,0.5) 0%, transparent 100%);
    z-index: 0; pointer-events: none;
  }

  #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
  #app-inner { width: 100%; max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; flex: 1; }

  /* ── Header ── */
  header {
    padding: 12px 12px 10px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,15,30,0.7);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
    gap: 12px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; line-height: 1; flex-shrink: 0; }
  .logo span { color: var(--teal); }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }
  .utc-time { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--teal); letter-spacing: 0.08em; text-align: right; flex-shrink: 0; }

  /* ── Route input section ── */
  #route-section {
    padding: 10px 12px 8px;
    background: rgba(10,15,30,0.5);
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }

  .input-row { display: flex; gap: 8px; align-items: stretch; }

  #route-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  #route-input::placeholder { color: var(--muted); text-transform: none; font-size: 0.8rem; letter-spacing: 0; }
  #route-input:focus { border-color: var(--teal); }

  #go-btn {
    background: var(--teal); color: var(--sky-dark);
    border: none; border-radius: 10px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
  }
  #go-btn:active { transform: scale(0.96); }
  #go-btn.loading { background: var(--teal-dim); pointer-events: none; }

  /* ── Altitude picker ── */
  .alt-label-row {
    display: flex; align-items: center; gap: 8px;
  }
  .alt-label-row label {
    font-family: 'DM Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
    flex-shrink: 0;
  }
  #alt-chips {
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; flex: 1;
  }
  #alt-chips::-webkit-scrollbar { display: none; }
  .alt-chip {
    flex-shrink: 0;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
    padding: 4px 10px;
    font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .alt-chip.active { background: rgba(0,212,184,0.15); border-color: var(--teal); color: var(--teal); font-weight: 500; }
  .alt-chip:active { transform: scale(0.94); }

  /* ── Route chips (waypoints) ── */
  #route-chips {
    display: flex; gap: 6px; padding: 10px 16px 6px;
    overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
    align-items: center;
  }
  #route-chips::-webkit-scrollbar { display: none; }
  .wp-chip {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .wp-chip.active { background: rgba(240,192,64,0.15); border-color: var(--gold); color: var(--gold); }
  .wp-chip.error  { background: rgba(244,67,54,0.1);  border-color: var(--severe); color: var(--severe); cursor: default; }
  .wp-chip:not(.error):active { transform: scale(0.94); }
  .wp-arrow { color: var(--muted); font-size: 0.8rem; flex-shrink: 0; }

  /* ── Wind panel ── */
  #wind-panel { padding: 0 12px 32px; flex: 1; }

  /* ── Route summary card (single altitude, all airports) ── */
  .route-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; backdrop-filter: blur(8px);
    margin-top: 12px;
    animation: fadeUp 0.3s ease both;
  }
  .route-card-head {
    display: grid; grid-template-columns: minmax(52px,64px) 1fr minmax(52px,60px) minmax(36px,44px) minmax(36px,44px) minmax(36px,44px);
    padding: 8px 10px;
    background: rgba(26,58,110,0.7); border-bottom: 1px solid var(--border);
  }
  .route-card-head span {
    font-family: 'DM Mono', monospace; font-size: 0.56rem;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .route-row {
    display: grid; grid-template-columns: minmax(52px,64px) 1fr minmax(52px,60px) minmax(36px,44px) minmax(36px,44px) minmax(36px,44px);
    padding: 9px 10px; border-bottom: 1px solid var(--border); align-items: center;
    transition: background 0.15s; cursor: pointer;
  }
  .route-row:last-child { border-bottom: none; }
  .route-row.active-row { background: rgba(240,192,64,0.07); }
  .route-row:active { background: rgba(255,255,255,0.04); }

  .rr-icao { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.06em; color: var(--gold); }
  .rr-name { font-size: 0.68rem; color: var(--muted); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 6px; }
  .rr-spd  { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.04em; text-align: center; }
  .rr-spd .kt { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--muted); }
  .rr-dir  { font-family: 'DM Mono', monospace; font-size: 0.72rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .rr-dir .deg { font-size: 0.58rem; color: var(--muted); }
  .rr-card { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); text-align: center; }

  /* Detail panel (single airport expanded) */
  .detail-header {
    padding: 14px 0 8px; display: flex; align-items: baseline; gap: 10px;
  }
  .ap-icao { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.1em; color: var(--gold); line-height: 1; }
  .ap-name { font-size: 0.82rem; color: var(--muted); font-weight: 300; }
  .surface-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; backdrop-filter: blur(8px);
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    animation: fadeUp 0.25s ease both;
  }
  .surface-card .slabel {
    grid-column: 1/-1; font-family: 'DM Mono', monospace; font-size: 0.58rem;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--teal);
    border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 2px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; line-height: 1; letter-spacing: 0.05em; }
  .stat-unit { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }

  .highlight-row {
    background: rgba(0,212,184,0.08); border: 1px solid rgba(0,212,184,0.25);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
    animation: fadeUp 0.28s ease both;
  }
  .highlight-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--teal); }
  .highlight-val   { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--teal); line-height: 1; }
  .highlight-sub   { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }

  /* Status / empty */
  .status-msg { text-align: center; padding: 48px 24px; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.1em; }
  .status-msg .icon { font-size: 2.2rem; display: block; margin-bottom: 12px; }

  /* Legend */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 8px 16px 0; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 0.62rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Colours */
  .spd-calm     { color: var(--calm); }
  .spd-moderate { color: var(--moderate); }
  .spd-strong   { color: var(--strong); }
  .spd-severe   { color: var(--severe); }

  .gust-tag { display: inline-block; background: rgba(244,67,54,0.15); border: 1px solid rgba(244,67,54,0.3); color: var(--severe); font-family: 'DM Mono', monospace; font-size: 0.58rem; padding: 1px 4px; border-radius: 3px; margin-left: 3px; }

  /* ── Leg cards ── */
  .leg-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; backdrop-filter: blur(8px);
    margin: 10px 0 0;
    animation: fadeUp 0.3s ease both;
  }
  .leg-header {
    display: flex; flex-wrap: wrap; align-items: center;
    padding: 8px 10px 6px;
    background: rgba(26,58,110,0.6); border-bottom: 1px solid var(--border);
    gap: 6px;
  }
  .leg-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em;
    color: var(--gold); white-space: nowrap; flex-shrink: 0; min-width: 0;
  }
  .leg-title .leg-arrow { color: var(--muted); margin: 0 4px; font-size: 0.9rem; }
  .leg-alt-chips {
    display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; flex: 1;
    -webkit-overflow-scrolling: touch;
  }
  .leg-alt-chips::-webkit-scrollbar { display: none; }
  .lac {
    flex-shrink: 0;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px;
    padding: 3px 8px;
    font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .lac.active { background: rgba(0,212,184,0.15); border-color: var(--teal); color: var(--teal); }
  .lac:active { transform: scale(0.93); }

  /* Altitude number input */
  .leg-alt-input-wrap {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .alt-ft-input {
    width: 41px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--teal);
    border-radius: 8px;
    padding: 4px 8px;
    color: var(--teal);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    text-align: right;
    outline: none;
    -webkit-appearance: none;
    -moz-appearance: textfield;
  }
  .alt-ft-input::-webkit-inner-spin-button,
  .alt-ft-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .alt-ft-input:focus { border-color: var(--gold); color: var(--gold); }
  .alt-ft-unit {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Avg wind banner */
  .leg-avg {
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
  }
  .leg-avg-label {
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'DM Mono', monospace; font-size: 0.52rem;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal);
    margin-bottom: 4px;
  }
  .avg-wind-line {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.05em;
  }
  .avg-wind-sep { color: var(--muted); font-size: 1rem; }

  /* Per-airport rows inside leg */
  .leg-row {
    display: flex; align-items: center; gap: 0;
    padding: 5px 10px; border-bottom: 1px solid var(--border);
  }
  .leg-row:last-child { border-bottom: none; }
  .lr-icao { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--gold); letter-spacing: 0.08em; flex-shrink: 0; width: 52px; }
  .lr-name { font-size: 0.62rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; padding-right: 6px; }
  .lr-wind { font-family: 'DM Mono', monospace; font-size: 0.78rem; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }

  /* Leg endpoint rows container */
  .leg-rows { overflow: hidden; }
  .leg-avg { cursor: pointer; user-select: none; }
  .leg-avg:hover { background: rgba(0,0,0,0.25); }
  .expand-hint { font-family: 'DM Mono', monospace; font-size: 0.68rem; font-weight: 700; color: var(--muted); opacity: 0.75; letter-spacing: 0.05em; margin-left: auto; }

  /* Error row */
  .err-row { padding: 10px 14px; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--severe); }

  /* ── Responsive ── */
  @media (min-width: 520px) {
    header, .controls-section { padding-left: 20px; padding-right: 20px; }
    #wind-panel { padding-left: 0; padding-right: 0; }
    .leg-card { margin-left: 0; margin-right: 0; border-radius: 18px; }
    .route-card { margin-left: 0; margin-right: 0; }
    .logo { font-size: 1.7rem; }
    .leg-title { font-size: 1.1rem; }
    .avg-wind-line { font-size: 1.45rem; }
  }
  @media (min-width: 768px) {
    header { padding: 14px 24px 12px; }
    .controls-section { padding: 12px 24px 10px; }
    #wind-panel { padding-bottom: 48px; }
    .logo { font-size: 1.9rem; }
    .rr-name, .lr-name { font-size: 0.72rem; }
    .leg-header { padding: 10px 14px 8px; }
    .leg-avg { padding: 8px 14px; }
    .leg-row { padding: 7px 14px; }
    .lr-wind { font-size: 0.82rem; }
    .alt-ft-input { width: 46px; font-size: 0.9rem; }
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin   { to { transform: rotate(360deg); } }

  footer { text-align: center; padding: 14px; font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); opacity: 0.45; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div id="app">
<div id="app-inner">
  <header>
    <div>
      <div class="logo">OTP<span>Only</span></div>
      <div class="logo-sub">Canada Route Winds</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0"><div class="utc-time" id="utc-clock">--:-- UTC</div><span id="stale-indicator" style="display:none;font-family:'DM Mono',monospace;font-size:0.52rem;color:var(--moderate);letter-spacing:0.08em"></span></div>
  </header>

  <!-- Route + altitude input -->
  <div id="route-section">
    <div class="input-row">
      <input id="route-input" type="text" placeholder="e.g. CYXL CYAC CYVZ CPV7" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="go-btn" onclick="handleGo()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-right:4px">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>Load
      </button>
    </div>
    <!-- Schedule import -->
    <div id="import-section">
      <div style="display:flex;gap:6px;margin-top:6px;align-items:center">
      <button id="opt-mode-btn" onclick="toggleOptMode()" style="background:none;border:1px solid var(--teal);color:var(--teal);font-size:0.65rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace">⛽ Fuel</button>
      <button onclick="showFinalize()" style="background:none;border:1px solid var(--gold);color:var(--gold);font-size:0.65rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace">📋 Finalize</button>
      <button onclick="openWeatherBriefing()" style="background:none;border:1px solid var(--teal);color:var(--teal);font-size:0.65rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace">🌦 Briefing</button>
      <button onclick="clearSession()" style="background:none;border:1px solid var(--severe);color:var(--severe);font-size:0.65rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace">✕ Clear</button>
      <button id="import-toggle" onclick="toggleImport()" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:0.65rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace">
        ＋ Import schedule
      </button>
      </div>
      <div id="import-panel" style="display:none;margin-top:8px">
        <textarea id="schedule-input" placeholder="Paste schedule table:&#10;Origin  Destination  Departure  Arrival&#10;YQT     YAT          13:15      15:05&#10;YAT     YQT          20:50      22:40"
          style="width:100%;height:110px;background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Mono',monospace;font-size:0.7rem;padding:10px;resize:vertical;outline:none;line-height:1.6"
          spellcheck="false"></textarea>
        <button onclick="importSchedule()" style="margin-top:6px;background:var(--teal);color:#000;border:none;border-radius:8px;padding:7px 18px;font-size:0.75rem;font-weight:600;cursor:pointer;letter-spacing:.04em">
          Import &amp; Load
        </button>
        <span id="import-status" style="margin-left:10px;font-size:0.65rem;color:var(--muted)"></span>
      </div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--calm)"></div>&lt;15 kts</div>
    <div class="leg"><div class="leg-dot" style="background:var(--moderate)"></div>15–30</div>
    <div class="leg"><div class="leg-dot" style="background:var(--strong)"></div>30–50</div>
    <div class="leg"><div class="leg-dot" style="background:var(--severe)"></div>50+</div>
  </div>

  <div id="wind-panel">
    <div class="status-msg"><span class="icon">✈️</span>Enter your route above<br><small>e.g. CYXL CYAC CYVZ CPV7</small></div>
  </div>

  <footer>Open-Meteo · Free · No API key · Each leg has its own altitude selector</footer>
</div><!-- /app-inner -->

<script src="airports.js"></script>
<script>

const AP_MAP = Object.fromEntries(AIRPORTS.map(a => [a.icao, a]));

// Known pressure levels with their standard altitudes in feet

// ── Clock ──────────────────────────────────────────────────
function checkCacheStale() {
  const now = Date.now();
  // Invalidate if fetched before midnight UTC today (data rolled over)
  const midnight = new Date();
  midnight.setUTCHours(0, 0, 0, 0);
  let invalidated = false;
  for (const key of Object.keys(cacheTime)) {
    if (cacheTime[key] < midnight.getTime()) {
      delete cache[key];
      delete cacheTime[key];
      invalidated = true;
    }
  }
  // Also clear memoized hIdx cache so "now" recalculates
  if (Object.keys(_hIdxCache).length) {
    for (const k of Object.keys(_hIdxCache)) {
      if (k === '__now__') delete _hIdxCache[k];
    }
  }
  if (invalidated) renderLegs();
  // Show stale indicator if oldest fetch > 2 hours ago
  const times = Object.values(cacheTime);
  const oldest = times.length ? Math.min(...times) : null;
  const staleEl = document.getElementById('stale-indicator');
  if (staleEl) {
    const ageMin = oldest ? Math.round((now - oldest) / 60000) : 0;
    staleEl.style.display = (oldest && ageMin > 120) ? 'inline' : 'none';
    if (oldest && ageMin > 120) staleEl.textContent = `⚠ winds ${ageMin}m old`;
  }
}
setInterval(checkCacheStale, 60000);

}

// ── Haversine distance in nautical miles ───────────────────
function distNm(lat1, lon1, lat2, lon2) {
  const R = 3440.065; // Earth radius in nm
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// ── True track in degrees (0–360) ──────────────────────────
function trackDeg(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const dLon  = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2))
          - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  const brng = Math.atan2(y, x) * 180 / Math.PI;
  return (brng + 360) % 360;
}

// Interpolate PC12 table at any altitude (ft)
function pc12AtAlt(altFt) {
  if (altFt <= 0) return PC12[0];
  if (altFt >= 30000) return PC12[PC12.length - 1];
  const lo = PC12.filter(r => r.alt <= altFt).pop();
  const hi = PC12.find(r => r.alt > altFt);
  if (!lo || !hi) return PC12[0];
  const t = (altFt - lo.alt) / (hi.alt - lo.alt);
  return {
    alt: altFt,
    time: lo.time + t * (hi.time - lo.time),
    fuel: lo.fuel + t * (hi.fuel - lo.fuel),
    dist: lo.dist + t * (hi.dist - lo.dist),
    tas:  lo.tas  + t * (hi.tas  - lo.tas),
    ff:   lo.ff   + t * (hi.ff   - lo.ff),
  };
}

// Valid hemispheric altitudes for a given true track (ft, IFR)
// Eastbound (0-179): odd thousands (3000,5000,7000...)
// Westbound (180-359): even thousands (2000,4000,6000...)
function hemisphericAlts(trackDeg, minFt = 2000, maxFt = 27000) {
  const eastbound = trackDeg < 180;
  const alts = [];
  for (let a = minFt; a <= maxFt; a += 1000) {
    const thousandsFt = a / 1000;
    if (eastbound && thousandsFt % 2 !== 0) alts.push(a); // odd
    if (!eastbound && thousandsFt % 2 === 0) alts.push(a); // even
  }
  return alts;
}

// Wind component along track: positive = tailwind, negative = headwind
// windDir: direction wind is FROM (met convention), trackDeg: aircraft true track
function windComponent(windDir, windSpd, trackDeg) {
  const angle = (windDir - trackDeg + 360) % 360;
  return -windSpd * Math.cos(angle * Math.PI / 180); // negative cos = tailwind when wind behind
}

// Colour based on tailwind component: positive = tailwind (always green), negative = headwind (by magnitude)
const twClass = (windDir, windSpd, track) => {
  if (windDir == null || windSpd == null) return '';
  const tw = windComponent(windDir, windSpd, track);
  if (tw >= 0) return 'spd-calm';
  const hw = Math.abs(tw);
  if (hw < 15) return 'spd-calm'; if (hw < 30) return 'spd-moderate'; if (hw < 50) return 'spd-strong'; return 'spd-severe';
};

  if (!dep || !arr || dep.error || arr.error) return;

  const legDist  = Math.round(distNm(dep.lat, dep.lon, arr.lat, arr.lon));
  const track    = trackDeg(dep.lat, dep.lon, arr.lat, arr.lon);
  const hIdx     = timeToHourlyIdx(legDepTime[legIdx] ?? null, crewInfo.scheduleDate);
  const maxFt    = legPax[legIdx] ? 25000 : 27000;
  const candidates = hemisphericAlts(track, 2000, maxFt);

  // Build rows for all candidates
  const rows = candidates.map(altFt => {
    const w = avgWindLeg(dep, arr, legDist, altFt, hIdx, legIdx);
    if (!w) return null;
    const perf = pc12AtAlt(altFt);
    const tailwind = windComponent(w.dir, w.spd ?? 0, track);
    const gs = Math.max(perf.tas + tailwind, 30);
    const climbDist = perf.dist;
    const cruiseDist = legDist - climbDist;
    if (cruiseDist < 0 || altFt > legDist * 100 + 2000) return null;

// ── Recommend altitudes for a leg ─────────────────────────
// Returns {bestFuel, bestTime} each: {alt, totalFuel, totalTimeMin, gs, tas, tailwind}
// Samples wind at each candidate altitude individually for accuracy
function recommendAlts(legDistNm, track, dep, arr, hIdx, maxFt = 27000, _li = null) {
  if (!legDistNm || legDistNm <= 0) return null;
  const candidates = hemisphericAlts(track, 2000, maxFt);
  let bestFuel = null, bestTime = null;

  for (const altFt of candidates) {
    // Get wind specific to this altitude
    const w = avgWindLeg(dep, arr, legDistNm, altFt, hIdx, _li);
    if (!w) continue;

    const perf = pc12AtAlt(altFt);
    const tailwind = windComponent(w.dir, w.spd ?? 0, track);
    const gs = Math.max(perf.tas + tailwind, 30);
    const climbDist = perf.dist;
    const cruiseDist = legDistNm - climbDist;

    if (cruiseDist < 0) continue;
    if (altFt > legDistNm * 100 + 2000) continue;

    const cruiseTimeHr = cruiseDist / gs;
    const cruiseFuel = cruiseTimeHr * perf.ff;
    const totalFuel = perf.fuel + cruiseFuel;
    const totalTimeHr = (perf.time / 3600) + cruiseTimeHr;

    const result = { alt: altFt, totalFuel: Math.round(totalFuel), totalTimeMin: Math.round(totalTimeHr * 60), gs: Math.round(gs), tas: Math.round(perf.tas), tailwind: Math.round(tailwind), windDir: Math.round(w.dir), windSpd: Math.round(w.spd) };

    if (!bestFuel || totalFuel < bestFuel.totalFuel) bestFuel = result;
    if (!bestTime || totalTimeHr < bestTime.totalTimeHr) { bestTime = { ...result, totalTimeHr }; }
  }
  return (bestFuel || bestTime) ? { bestFuel, bestTime } : null;
}

// ── Circular-mean wind average ─────────────────────────────
// Average an array of {dir, spd} wind samples (circular mean for direction)
function avgWindSamples(samples) {
  const valid = samples.filter(Boolean);
  if (!valid.length) return null;
  const spd = valid.reduce((s, w) => s + (w.spd ?? 0), 0) / valid.length;
  const sinSum = valid.reduce((s, w) => s + Math.sin((w.dir ?? 0) * Math.PI / 180), 0);
  const cosSum = valid.reduce((s, w) => s + Math.cos((w.dir ?? 0) * Math.PI / 180), 0);
  let dir = Math.atan2(sinSum / valid.length, cosSum / valid.length) * 180 / Math.PI;
  if (dir < 0) dir += 360;
  return { spd: Math.round(spd * 10) / 10, dir: Math.round(dir) };
}



// Interpolate a point fraction t (0–1) along great circle from (lat1,lon1) to (lat2,lon2)
function gcInterp(lat1, lon1, lat2, lon2, t) {
  const toR = d => d * Math.PI / 180;
  const toD = r => r * 180 / Math.PI;
  const φ1 = toR(lat1), λ1 = toR(lon1), φ2 = toR(lat2), λ2 = toR(lon2);
  const d = 2 * Math.asin(Math.sqrt(
    Math.sin((φ2-φ1)/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2
  ));
  if (d < 1e-10) return { lat: lat1, lon: lon1 };
  const A = Math.sin((1-t)*d)/Math.sin(d);
  const B = Math.sin(t*d)/Math.sin(d);
  const x = A*Math.cos(φ1)*Math.cos(λ1) + B*Math.cos(φ2)*Math.cos(λ2);
  const y = A*Math.cos(φ1)*Math.sin(λ1) + B*Math.cos(φ2)*Math.sin(λ2);
  const z = A*Math.sin(φ1) + B*Math.sin(φ2);
  return { lat: toD(Math.atan2(z, Math.sqrt(x*x+y*y))), lon: toD(Math.atan2(y, x)) };
}

// ── Build dynamic pressure level bounds from geopotential heights ──
// Returns array of {hpa, ft} using actual forecast geo heights at hIdx
// Falls back to ISA standard altitudes if data not available
function getDynamicPlBounds(key, hIdx) {
  const data = cache[key];
  if (!data || data.error) return null;
  const h = data.hourly;
  const levels = PRESSURE_LEVELS.map(lvl => {
    if (!lvl.hpa) return { hpa: null, ft: 0 }; // surface always 0
    const geoM = (h[`geopotential_height_${lvl.hpa}hPa`] || [])[hIdx];
    // Geopotential height in metres → feet (1m = 3.28084ft)
    const ft = geoM != null ? Math.round(geoM * 3.28084) : lvl.ft;
    return { hpa: lvl.hpa, ft };
  });
  return levels;
}

// ── Interpolate wind at arbitrary altitude for one airport ─
// Uses linear interpolation of speed and circular interp of direction
// between the two surrounding pressure levels.
function getWindAtFt(icao, targetFt, hIdx) {
  const data = cache[icao];
  if (!data || data.error) return null;

  // Clamp to valid range
  const ft = Math.max(0, Math.min(targetFt, 39000));

  // Use actual geopotential heights for this station/time if available
  const dynLevels = getDynamicPlBounds(icao, hIdx);
  const levels = dynLevels || PRESSURE_LEVELS;
  let lo = levels[0], hi = levels[levels.length - 1];
  for (let i = 0; i < levels.length - 1; i++) {
    if (ft >= levels[i].ft && ft <= levels[i + 1].ft) { lo = levels[i]; hi = levels[i + 1]; break; }
  }

  const wLo = getRawWind(data, lo, hIdx);
  const wHi = getRawWind(data, hi, hIdx);
  if (!wLo && !wHi) return null;
  if (!wLo) return wHi;
  if (!wHi) return wLo;

  // Log-pressure interpolation factor (0 = at lo, 1 = at hi)
  // Wind varies more linearly with log(pressure) than with altitude
  const loP = lo.hpa || 1013.25;
  const hiP = hi.hpa || 1013.25;
  const ftP = loP === hiP ? loP : Math.exp(
    Math.log(loP) + (Math.log(hiP) - Math.log(loP)) * ((ft - lo.ft) / (hi.ft - lo.ft || 1))
  );
  const range = Math.log(hiP) - Math.log(loP);
  const t = range === 0 ? 0 : (Math.log(ftP) - Math.log(loP)) / range;

  // Speed: linear
  const spd = wLo.spd != null && wHi.spd != null
    ? Math.round((wLo.spd + t * (wHi.spd - wLo.spd)) * 10) / 10
    : (wLo.spd ?? wHi.spd);

  // Direction: circular interpolation
  let dir = null;
  if (wLo.dir != null && wHi.dir != null) {
    const r0 = wLo.dir * Math.PI / 180;
    const r1 = wHi.dir * Math.PI / 180;
    const sinI = Math.sin(r0) + t * (Math.sin(r1) - Math.sin(r0));
    const cosI = Math.cos(r0) + t * (Math.cos(r1) - Math.cos(r0));
    dir = Math.atan2(sinI, cosI) * 180 / Math.PI;
    if (dir < 0) dir += 360;
    dir = Math.round(dir);
  } else {
    dir = wLo.dir ?? wHi.dir;
  }

  return { spd, dir, gusts: ft === 0 ? wLo.gusts : null };
}

// ── Resolve a departure time string to an hourly index ─────
// depTime: "HH:MM" Zulu (UTC), or null (= current time)
// Returns the index into Open-Meteo hourly arrays (0 = first hour of day 1)
const _hIdxCache = {};
function offsetHIdx(hIdx, hours) {
  // Offset an hourly index by fractional hours, clamped to 0–71
  return Math.max(0, Math.min(71, Math.round(hIdx + hours)));
}

function timeToHourlyIdx(depTime, schedDate) {
  // schedDate: optional Date object for the schedule day (UTC midnight).
  // If provided, times are anchored to that date rather than today.
  const now = new Date();
  const midnight = new Date(now);
  midnight.setUTCHours(0, 0, 0, 0);

  if (!depTime) {
    // No time given — use current UTC hour relative to today's midnight
    return Math.max(0, Math.min(now.getUTCHours(), 71));
  }

  const cacheKey = depTime + (schedDate ? schedDate.toISOString() : '');
  if (_hIdxCache[cacheKey] != null) return _hIdxCache[cacheKey];

  const [hh, mm] = depTime.split(':').map(Number);

  let target;
  if (schedDate && !isNaN(schedDate.getTime())) {
    // Anchor to the imported schedule date
    target = new Date(schedDate);
    target.setUTCHours(hh, mm, 0, 0);
  } else {
    // No schedule date — use today, roll to tomorrow if time is in the past
    target = new Date(now);
    target.setUTCHours(hh, mm, 0, 0);
    if (target < now - 30 * 60000) target.setUTCDate(target.getUTCDate() + 1);
  }

  // Open-Meteo hourly[0] = midnight UTC of today
  const idx = Math.round((target - midnight) / 3600000);
  const result = Math.max(0, Math.min(idx, 71));
  _hIdxCache[cacheKey] = result;
  return result;
}

// Convert Zulu "HH:MM" to local time string like "14:35 EDT"
function zuluToLocal(zuluTime) {
  if (!zuluTime) return null;
  const parts = zuluTime.split(':').map(Number);
  const d = new Date();
  d.setUTCHours(parts[0], parts[1], 0, 0);
  const localH = String(d.getHours()).padStart(2, '0');
  const localM = String(d.getMinutes()).padStart(2, '0');
  const tz = Intl.DateTimeFormat([], { timeZoneName: 'short' }).formatToParts(d).find(p => p.type === 'timeZoneName')?.value || '';
  return `${localH}:${localM} ${tz}`;
}

// Get raw wind from cached data for a pressure level at a given hourly index
function getRawWind(data, lvl, hIdx) {
  if (!lvl.hpa) {
    // Use hourly surface winds at the target hour instead of current obs
    const h = data.hourly;
    const spd   = mpsToKts((h['windspeed_10m']   || [])[hIdx]);
    const rawDir = (h['winddirection_10m']  || [])[hIdx];
    // Gusts aren't in hourly, show null
    return { spd, dir: rawDir != null ? Math.round(rawDir) : null, gusts: null };
  }
  const h = data.hourly;
  const spd    = mpsToKts((h[`windspeed_${lvl.hpa}hPa`]   || [])[hIdx]);
  const rawDir = (h[`winddirection_${lvl.hpa}hPa`] || [])[hIdx];
  return { spd, dir: rawDir != null ? Math.round(rawDir) : null, gusts: null };
}

// ── Fetch one airport (all pressure levels) ────────────────
const WIND_VARS = (() => {
  const hpas = PRESSURE_LEVELS.filter(l => l.hpa).map(l => l.hpa);
  return [
    ...hpas.map(h => `windspeed_${h}hPa`),
    ...hpas.map(h => `winddirection_${h}hPa`),
    ...hpas.map(h => `geopotential_height_${h}hPa`),
    'windspeed_10m', 'winddirection_10m'
  ].join(',');
})();

async function fetchLatLon(lat, lon, key) {
  if (cache[key]) return;
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`
    + `&hourly=${WIND_VARS}&wind_speed_unit=ms&forecast_days=3`;
  let r;
  try { r = await fetch(url); }
  catch (e) { throw new Error(`Network error: ${e.message}`); }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  let json;
  try { json = await r.json(); }
  catch (e) { throw new Error('Invalid JSON from Open-Meteo'); }
  if (!json || !json.hourly) throw new Error('No hourly data in response');
  cache[key] = json;
  cacheTime[key] = Date.now();
}

async function fetchAirport(ap) {
  if (cache[ap.icao]) return;
  await fetchLatLon(ap.lat, ap.lon, ap.icao);
}

// Sample wind along a leg every 100 nm (for legs > 150 nm), always including dep & arr
// Fetch midpoint weather and store keys in legMidKeys[li]
async function fetchLegMidpoints(li, dep, arr, legDistNm) {
  if (legDistNm <= 150) { legMidKeys[li] = []; return; }
  const nIntervals = Math.ceil(legDistNm / 100);
  const pts = [];
  for (let i = 1; i < nIntervals; i++) {
    const t = i / nIntervals;
    const pt = gcInterp(dep.lat, dep.lon, arr.lat, arr.lon, t);
    pts.push({ key: `mid:${pt.lat.toFixed(3)},${pt.lon.toFixed(3)}`, lat: pt.lat, lon: pt.lon });
  }
  await Promise.allSettled(pts.map(({ key, lat, lon }) => fetchLatLon(lat, lon, key)));
  legMidKeys[li] = pts.map(p => p.key);
}

function avgWindLeg(dep, arr, legDistNm, ft, hIdx, li) {
  const samples = [getWindAtFt(dep.icao, ft, hIdx)];
  const midKeys = legMidKeys[li] || [];
  for (const key of midKeys) {
    if (cache[key]) samples.push(getWindAtFt(key, ft, hIdx));
  }
  samples.push(getWindAtFt(arr.icao, ft, hIdx));
  return avgWindSamples(samples);
}

// ── Parse route ────────────────────────────────────────────
function parseRoute(raw) {
  return raw.trim().toUpperCase().split(/\s+/).filter(Boolean).map(t => {
    if (AP_MAP[t]) return {...AP_MAP[t]};
    if (t.length === 3 && AP_MAP['CY' + t]) return {...AP_MAP['CY' + t]};
    if (t.length === 3 && AP_MAP['CZ' + t]) return {...AP_MAP['CZ' + t]};
    return { icao: t, error: true };
  });
}

// ── Toggle optimisation mode (fuel vs speed) ──────────────
function toggleOptMode() {
  optMode = optMode === 'fuel' ? 'speed' : 'fuel';
  // Clear manual overrides so alts repopulate from new mode
  legAltManual = legAltManual.map(() => false);
  legAltFt = [];
  const btn = document.getElementById('opt-mode-btn');
  if (btn) {
    btn.textContent = optMode === 'fuel' ? '⛽ Fuel' : '⚡ Speed';
    btn.style.borderColor = optMode === 'fuel' ? 'var(--teal)' : 'var(--gold)';
    btn.style.color = optMode === 'fuel' ? 'var(--teal)' : 'var(--gold)';
  }
  renderLegs();
  saveSession();
}

// ── Toggle pax/no-pax for a leg ───────────────────────────
function toggleLegPax(li) {
  legPax[li] = !legPax[li];
  // If manual alt exceeds new cap, clear it so it repopulates
  const cap = legPax[li] ? 25000 : 27000;
  if (legAltManual[li] && legAltFt[li] > cap) legAltManual[li] = false;
  renderLegs();
  saveSession();
}

// ── Toggle leg expanded state ──────────────────────────────
function toggleLeg(li) {
  legExpanded[li] = !legExpanded[li];
  renderLegs();
}

// ── Select a recommended altitude for a leg ───────────────
function selectRecAlt(legIdx, altFt) {
  legAltFt[legIdx]     = altFt;
  legAltManual[legIdx] = true;
  // Update the input box to match
  const inp = document.getElementById(`alt-inp-${legIdx}`);
  if (inp) inp.value = altFt / 100;
  renderLegs();
  saveSession();
}

// ── Altitude input change for a leg ───────────────────────
function onLegAltChange(legIdx) {
  const inp = document.getElementById(`alt-inp-${legIdx}`);
  const val = parseInt(inp.value) * 100;  // input is hundreds, store as feet
  if (!isNaN(val) && val >= 0 && val <= 45000) {
    legAltFt[legIdx] = val;
    legAltManual[legIdx] = true;
    renderLegs();
    saveSession();
  }
}

// ── Departure time text input for a leg (forces 24h Zulu) ─
function onLegTimeText(legIdx, inp) {
  // Auto-insert colon after 2 digits
  let v = inp.value.replace(/[^0-9:]/g, '');
  if (v.length === 2 && !v.includes(':') && inp._lastLen !== 3) v = v + ':';
  inp._lastLen = v.length;
  inp.value = v;
  // Validate HH:MM
  const m = v.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
  if (m) {
    const hh = m[1].padStart(2, '0');
    const mm = m[2];
    legDepTime[legIdx] = `${hh}:${mm}`;
    inp.style.color = '';
    renderLegs();
    saveSession();
  } else if (v === '') {
    legDepTime[legIdx] = null;
    inp.style.color = '';
    renderLegs();
  } else {
    inp.style.color = 'var(--severe)';
  }
}

// ── Render a single altitude recommendation row ───────────
function renderRecRow(r, label, color, legTrack, legIdx, isActiveMode) {
  if (!r) return '';
  const isHw    = r.tailwind < 0;
  const twLabel = isHw ? 'HW' : 'TW';
  const twStr   = `${twLabel} ${Math.abs(r.tailwind)}kt`;
  const twColor = !isHw ? 'var(--calm)'
    : Math.abs(r.tailwind) < 15 ? 'var(--calm)'
    : Math.abs(r.tailwind) < 30 ? 'var(--moderate)'
    : Math.abs(r.tailwind) < 50 ? 'var(--strong)' : 'var(--severe)';
  const arrowRot = r.windDir != null ? r.windDir - legTrack + 180 : 0;
  const windStr  = r.windDir != null ? `${String(r.windDir).padStart(3,'0')}° / ${r.windSpd}kt` : '';
  // Selected if: manually chosen, OR this row matches the active opt mode and no manual override
  const isSelected = legAltManual[legIdx]
    ? legAltFt[legIdx] === r.alt
    : isActiveMode;
  return `<div onclick="selectRecAlt(${legIdx??'null'}, ${r.alt})" style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--border);background:${isSelected?'rgba(0,212,184,0.08)':'rgba(0,0,0,0.1)'};cursor:pointer;transition:background 0.15s" onmouseenter="this.style.background='rgba(255,255,255,0.04)'" onmouseleave="this.style.background='${isSelected?'rgba(0,212,184,0.08)':'rgba(0,0,0,0.1)'}'">
    <span style="font-family:'DM Mono',monospace;font-size:0.58rem;color:${color};text-transform:uppercase;letter-spacing:0.1em;flex-shrink:0">${label}</span>
    <span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:${color};letter-spacing:0.05em;flex-shrink:0">${r.alt/100}</span>
    <span style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--muted);flex-shrink:0">GS ${r.gs}kt · ${r.totalFuel}lb · ${r.totalTimeMin}min</span>
    <div style="display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0">
      <span style="font-family:'DM Mono',monospace;font-size:0.62rem;color:${twColor}">${windStr}</span>
      <span style="font-size:0.9rem;transform:rotate(${arrowRot}deg);display:inline-block;opacity:0.85;transition:transform 0.3s;line-height:1;color:${twColor}">↑</span>
      <span style="font-family:'DM Mono',monospace;font-size:0.62rem;color:${twColor};margin-left:2px">${twStr}</span>
    </div>
  </div>`;
}

// ── Render a single airport wind row (expanded view) ───────
function renderWindRow(wp, w, loading, legTrack) {
  const spd = w?.spd ?? null;
  const dir = w?.dir ?? null;
  const rot = dir != null ? dir - legTrack + 180 : 0;
  const windStr = loading ? '…' : (dir != null ? `${fmtDir(dir)} / ${fmtSpd(spd)} kt` : '—');
  return `<div class="leg-row">
    <div class="lr-icao">${wp.icao}</div>
    <div class="lr-name">${wp.name ?? ''}</div>
    <div class="lr-wind">
      <span class="${twClass(dir, spd, legTrack)}">${windStr}</span>
      <span style="font-size:0.9rem;transform:rotate(${rot}deg);display:inline-block;opacity:${dir!=null?0.85:0.15};transition:transform 0.4s">↑</span>
    </div>
  </div>`;
}

// ── Render all leg cards ───────────────────────────────────
function renderLegs() {
  const panel = document.getElementById('wind-panel');

  if (!route.length) {
    panel.innerHTML = `<div class="status-msg"><span class="icon">✈️</span>Enter your route above<br><small>e.g. CYXL CYAC CYVZ CPV7</small></div>`;
    return;
  }
  if (route.length < 2) {
    panel.innerHTML = `<div class="status-msg"><span class="icon">✈️</span>Add at least 2 airports to see leg winds</div>`;
    return;
  }

  let html = '';

  for (let li = 0; li < route.length - 1; li++) {
    const dep   = route[li];
    const arr   = route[li + 1];
    // Auto-prefill altitude from recommendation if not manually overridden
    // Compute leg geometry once — reused throughout this leg's render
    const depTime  = legDepTime[li] ?? null;
    const hIdx     = timeToHourlyIdx(depTime, crewInfo.scheduleDate);
    const legDist  = (!dep.error && !arr.error) ? distNm(dep.lat, dep.lon, arr.lat, arr.lon) : 0;
    const legTrack = (!dep.error && !arr.error) ? trackDeg(dep.lat, dep.lon, arr.lat, arr.lon) : 0;

    let ft = legAltFt[li];
    if (!legAltManual[li] && !dep.error && !arr.error) {
      if (cache[dep.icao] && cache[arr.icao] && legDist > 5) {
        const _cap = legPax[li] ? 25000 : 27000;
        const _rec = recommendAlts(legDist, legTrack, dep, arr, hIdx, _cap, li);
        if (_rec) {
          const chosen = optMode === 'fuel' ? _rec.bestFuel : _rec.bestTime;
          if (chosen) {
            ft = chosen.alt;
            legAltFt[li] = ft;
          }
        }
      }
    }
    if (ft == null) ft = 10000;
    const label = fmtFt(ft);

    // Human-readable time label (local time shown next to Zulu input)
    const localTimeLabel = depTime ? zuluToLocal(depTime) : null;

    // Find surrounding levels for the interp note
    let loLvl = PRESSURE_LEVELS[0], hiLvl = PRESSURE_LEVELS[PRESSURE_LEVELS.length-1];
    for (let i = 0; i < PRESSURE_LEVELS.length - 1; i++) {
      if (ft >= PRESSURE_LEVELS[i].ft && ft <= PRESSURE_LEVELS[i+1].ft) {
        loLvl = PRESSURE_LEVELS[i]; hiLvl = PRESSURE_LEVELS[i+1]; break;
      }
    }
    const interpNote = ft > 0 && loLvl.ft !== hiLvl.ft
      ? `interpolated between ${fmtFt(loLvl.ft)} & ${fmtFt(hiLvl.ft)}`
      : '';

    html += `<div class="leg-card">
      <div class="leg-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap">
          <div class="leg-title" style="flex:1;min-width:0">${dep.error?`<span style="color:var(--severe)">${dep.icao}</span>`:dep.icao}<span class="leg-arrow">›</span>${arr.error?`<span style="color:var(--severe)">${arr.icao}</span>`:arr.icao}${(!dep.error && !arr.error) ? `<span style="font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;margin-left:8px;font-weight:400">${Math.round(legDist)} nm · ${Math.round(legTrack).toString().padStart(3,'0')}°T</span>` : ''}</div>
          <button onclick="toggleLegPax(${li})" style="background:none;border:1px solid ${legPax[li]?'var(--gold)':'var(--border)'};color:${legPax[li]?'var(--gold)':'var(--muted)'};font-size:0.6rem;padding:3px 7px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;white-space:nowrap;letter-spacing:.04em;flex-shrink:0">${legPax[li]?'👤 PAX':'👤 NO PAX'}</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap;width:100%;margin-top:6px">
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
            <span style="font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Depart (Z)</span>
            <input id="dep-time-${li}" class="alt-ft-input" type="text" inputmode="numeric"
              placeholder="HH:MM" value="${depTime||''}" maxlength="5"
              style="width:52px;padding:4px 4px;font-size:0.75rem;text-align:center"
              oninput="onLegTimeText(${li},this)" />
            ${localTimeLabel ? `<span style="font-size:0.75rem;color:var(--muted);white-space:nowrap">${localTimeLabel}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0">
            <div class="leg-alt-input-wrap">
              <span style="font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Altitude</span>
              <input id="alt-inp-${li}" class="alt-ft-input" type="number" value="${Math.round(ft/100)}" min="0" max="450" step="1"
                onchange="onLegAltChange(${li})" onblur="onLegAltChange(${li})"
                onfocus="showAltPopover(${li})" />
            </div>
          </div>
        </div>
      </div>`;

    if (dep.error || arr.error) {
      html += `<div class="err-row">⚠ ${dep.error?dep.icao:''} ${arr.error?arr.icao:''} not in database</div></div>`;
      continue;
    }

    const depLoading = !cache[dep.icao];
    const arrLoading = !cache[arr.icao];
    const wDep = getWindAtFt(dep.icao, ft, hIdx);
    // Estimate arrival hIdx by offsetting dep hIdx by approximate flight time
    const estGs = 240; // rough GS for hIdx offset — refined after winds known
    const estFlightHr = legDist > 0 ? legDist / estGs : 0;
    const arrHIdx = offsetHIdx(hIdx, estFlightHr);
    const wArr = getWindAtFt(arr.icao, ft, arrHIdx);
    const avg  = avgWindLeg(dep, arr, legDist, ft, hIdx, li);
    const arrowRot = avg?.dir != null ? avg.dir - legTrack + 180 : 0;
    const rec = (!depLoading && !arrLoading && avg && legDist > 5)
      ? recommendAlts(legDist, legTrack, dep, arr, hIdx, legPax[li] ? 25000 : 27000, li) : null;

    // Avg banner
    const avgWindStr = avg
      ? `${fmtDir(avg.dir)} / ${fmtSpd(avg.spd)} kt`
      : (depLoading||arrLoading ? '…' : '—');
    const isExpanded = !!legExpanded[li];
    html += `<div class="leg-avg" onclick="toggleLeg(${li})">
      <div class="leg-avg-label"><span>${isExpanded ? `◈ Avg · ${label}${interpNote ? ' · <span style="opacity:0.6;font-size:0.48rem">'+interpNote+'</span>' : ''} · ` : ''}</span><span class="expand-hint">${isExpanded ? '▲ collapse' : '▼ details'}</span></div>
      <div class="avg-wind-line">
        <span class="${twClass(avg?.dir, avg?.spd, legTrack)}">${avgWindStr}</span>
        <span style="font-size:1.4rem;transform:rotate(${arrowRot}deg);display:inline-block;opacity:${avg?0.9:0.2};transition:transform 0.4s;line-height:1">↑</span>
        ${avg?.gusts ? `<span style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--severe);margin-left:2px">G${fmtSpd(avg.gusts)}</span>` : ''}
      </div>
    </div>`;

    // renderWindRow is defined above renderLegs

    // Altitude recommendation banner
    if (rec) {
      const sameFuelTime = rec.bestFuel?.alt === rec.bestTime?.alt;
      if (sameFuelTime) {
        html += renderRecRow(rec.bestFuel, '⚡ Best', 'var(--teal)', legTrack, li, true);
      } else {
        html += renderRecRow(rec.bestFuel, '⛽ Fuel', 'var(--teal)', legTrack, li, optMode === 'fuel');
        html += renderRecRow(rec.bestTime, '⚡ Fast', 'var(--gold)', legTrack, li, optMode === 'speed');
      }
    }

    if (isExpanded) {
      html += `<div class="leg-rows">`;

      html += renderWindRow(dep, wDep, depLoading, legTrack);

      // Midpoints along the leg (for legs > 150 nm)
      if (legDist > 150) {
        const midKeys = legMidKeys[li] || [];
        const nIntervals = midKeys.length + 1;
        midKeys.forEach((key, mi) => {
          const t = (mi + 1) / nIntervals;
          const distToArr = Math.round(legDist * (1 - t));
          const midFlightHr = legDist > 0 ? (legDist * (1 - (mi + 1) / (midKeys.length + 1))) / estGs : 0;
          const midHIdx = offsetHIdx(hIdx, estFlightHr - midFlightHr);
          const wMid = cache[key] ? getWindAtFt(key, ft, midHIdx) : null;
          const midLoading = !cache[key];
          const [mlat, mlon] = key.replace('mid:','').split(',').map(Number);
          const midWp = { icao: `${distToArr}nm`, name: `${Math.round(mlat*10)/10}°N ${Math.round(Math.abs(mlon)*10)/10}°${mlon<0?'W':'E'}` };
          html += renderWindRow(midWp, wMid, midLoading, legTrack);
        });
      }

      html += renderWindRow(arr, wArr, arrLoading, legTrack);

      html += `</div>`;
    }
    html += `</div>`;
  }

  // ── Route fuel & time summary ─────────────────────────────
  let summaryHtml = '';
  if (route.length >= 2) {
    let totalFuelSum = 0, totalTimeSum = 0, legsWithData = 0;
    for (let li = 0; li < route.length - 1; li++) {
      const dep = route[li], arr = route[li + 1];
      if (dep.error || arr.error) continue;
      const legDistS  = distNm(dep.lat, dep.lon, arr.lat, arr.lon);
      const hIdxS     = timeToHourlyIdx(legDepTime[li] ?? null, crewInfo.scheduleDate);
      const capS      = legPax[li] ? 25000 : 27000;
      const recS      = (cache[dep.icao] && cache[arr.icao] && legDistS > 5)
        ? recommendAlts(legDistS, trackDeg(dep.lat,dep.lon,arr.lat,arr.lon), dep, arr, hIdxS, capS, li)
        : null;
      const best = recS ? (optMode === 'fuel' ? recS.bestFuel : recS.bestTime) : null;
      if (best) { totalFuelSum += best.totalFuel; totalTimeSum += best.totalTimeMin; legsWithData++; }
    }
    if (legsWithData > 0) {
      const hrs  = Math.floor(totalTimeSum / 60);
      const mins = totalTimeSum % 60;
      const allLegs = route.length - 1;
      const partial  = legsWithData < allLegs
        ? `<span style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted);opacity:0.6"> ${legsWithData}/${allLegs} legs</span>` : '';
      summaryHtml = `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;margin:10px 0 4px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(8px)">
        <span style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase">Route Total${partial}</span>
        <span style="display:flex;gap:20px;align-items:baseline">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--teal);letter-spacing:0.05em">${Math.round(totalFuelSum)}<span style="font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--muted);margin-left:3px">lb</span></span>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--teal);letter-spacing:0.05em">${hrs}h ${String(mins).padStart(2,'0')}m</span>
        </span>
      </div>`;
    }
  }

  panel.innerHTML = html + summaryHtml;
}

// ── Schedule import ────────────────────────────────────────
function toggleImport() {
  const panel = document.getElementById('import-panel');
  const btn   = document.getElementById('import-toggle');
  const open  = panel.style.display === 'none';
  panel.style.display = open ? 'block' : 'none';
  btn.textContent = open ? '✕ Close import' : '＋ Import schedule';

// ── LocalStorage persistence ─────────────────────────────────
const LS_KEY = 'otponly_session_v1';

function saveSession() {
  try {
    const data = {
      routeRaw:    document.getElementById('route-input').value,
      legAltFt,
      legAltManual,
      legDepTime,
      legPax,
      optMode,
      crewInfo: {
        captain:      crewInfo.captain,
        fo:           crewInfo.fo,
        aircraft:     crewInfo.aircraft,
        date:         crewInfo.date,
        dutyStart:    crewInfo.dutyStart,
        dutyStop:     crewInfo.dutyStop,
        scheduleDate: crewInfo.scheduleDate ? crewInfo.scheduleDate.toISOString() : null,
      },
    };
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data.routeRaw) return;

    // Restore opt mode first so button label is right
    if (data.optMode) {
      optMode = data.optMode;
      const btn = document.getElementById('opt-mode-btn');
      if (btn) {
        btn.textContent   = optMode === 'fuel' ? '⛽ Fuel' : '⚡ Speed';
        btn.style.borderColor = optMode === 'fuel' ? 'var(--teal)' : 'var(--gold)';
        btn.style.color       = optMode === 'fuel' ? 'var(--teal)' : 'var(--gold)';
      }
    }

    // Restore crew info
    if (data.crewInfo) {
      crewInfo.captain   = data.crewInfo.captain   || '';
      crewInfo.fo        = data.crewInfo.fo        || '';
      crewInfo.aircraft  = data.crewInfo.aircraft  || '';
      crewInfo.date      = data.crewInfo.date      || '';
      crewInfo.dutyStart = data.crewInfo.dutyStart || '';
      crewInfo.dutyStop  = data.crewInfo.dutyStop  || '';
      crewInfo.scheduleDate = data.crewInfo.scheduleDate
        ? new Date(data.crewInfo.scheduleDate)
        : null;
    }

    // Restore per-leg arrays before calling handleGo so they survive the resize
    if (Array.isArray(data.legAltFt))     legAltFt     = data.legAltFt;
    if (Array.isArray(data.legAltManual)) legAltManual = data.legAltManual;
    if (Array.isArray(data.legDepTime))   legDepTime   = data.legDepTime;
    if (Array.isArray(data.legPax))       legPax       = data.legPax;

    // Restore route input and trigger load
    const input = document.getElementById('route-input');
    input.value = data.routeRaw;
    handleGo();
  } catch(e) {}
}

function clearSession() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  location.reload();
}

// ── Weather briefing via Weathered Strip ────────────────────
function openWeatherBriefing() {
  if (!route || route.length < 2) return;
  const stations = route.map(a => a.icao).join('%20');
  window.open('https://weatheredstrip.com/request?stations=' + stations, '_blank');
}

// ── Finalize: generate log sheet row ───────────────────────
function showFinalize() {
  if (!route || route.length < 2) {
    alert('Load a route first.');
    return;
  }

  const lines = [];

  // ── BLOCK 1: aircraft + crew (paste at N2) ──────────────
  // Row 1 (N2): aircraft
  // Row 2 (N3): blank
  // Row 3 (N4): captain \t\t FO  (skip O col = FO label)
  const block1Lines = [
    crewInfo.aircraft || '',
    '',
    (crewInfo.captain || '') + '\t\t' + (crewInfo.fo || ''),
  ];

  // ── BLOCK 2: legs (paste at A8) ──────────────────────────
  // A=FROM  B=TO  C=blank  D=ALT  E=blank  F=W/V  G-K=blank(5)  L=ETD
  const block2Lines = [];
  for (let li = 0; li < route.length - 1; li++) {
    const dep = route[li];
    const arr = route[li + 1];
    if (dep.error || arr.error) {
      block2Lines.push(`${dep.icao}\t${arr.icao}`);
      continue;
    }
    const depTime  = legDepTime[li] ?? null;
    const hIdx     = timeToHourlyIdx(depTime, crewInfo.scheduleDate);
    const legDistF = Math.round(distNm(dep.lat,dep.lon,arr.lat,arr.lon));

    // legAltFt[li] is always current — renderLegs writes it on every render
    const ft  = legAltFt[li] ?? 10000;
    const avg = avgWindLeg(dep, arr, legDistF, ft, hIdx, li);
    const altHft  = Math.round(ft / 100);
    const wv      = avg ? `${String(Math.round(avg.dir)).padStart(3,'0')}/${Math.round(avg.spd)}` : '';
    const etd     = depTime || '';
    block2Lines.push([dep.icao, arr.icao, '', altHft, '', wv, '', '', '', '', '', etd].join('\t'));
  }

  // Show modal
  let modal = document.getElementById('finalize-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'finalize-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;padding:16px;gap:10px;';
    modal.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--gold);letter-spacing:0.1em">📋 Log Sheet</span>
        <button onclick="document.getElementById('finalize-modal').style.display='none'" style="background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.7rem">✕ Close</button>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--teal);background:rgba(0,212,184,0.08);border:1px solid rgba(0,212,184,0.2);border-radius:8px;padding:8px 10px;flex-shrink:0;line-height:1.8">
        1. Tap <b>Copy Block 1</b> → select cell <b>N2</b> in Numbers → paste<br>
        2. Tap <b>Copy Block 2</b> → select cell <b>A8</b> in Numbers → paste
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted);flex-shrink:0">BLOCK 1 — Aircraft &amp; Crew → paste at N2</div>
      <textarea id="finalize-b1" readonly style="height:72px;background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Mono',monospace;font-size:0.65rem;padding:10px;resize:none;outline:none;line-height:1.8;white-space:pre;overflow:auto;flex-shrink:0"></textarea>
      <button onclick="copyFinalizeBlock(1)" style="background:var(--teal);color:#000;border:none;border-radius:8px;padding:9px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;flex-shrink:0">⎘ Copy Block 1</button>
      <div style="font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--muted);flex-shrink:0;margin-top:4px">BLOCK 2 — Legs → paste at A8</div>
      <textarea id="finalize-b2" readonly style="flex:1;background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Mono',monospace;font-size:0.65rem;padding:10px;resize:none;outline:none;line-height:1.8;white-space:pre;overflow:auto"></textarea>
      <button onclick="copyFinalizeBlock(2)" style="background:var(--gold);color:#000;border:none;border-radius:8px;padding:9px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;flex-shrink:0">⎘ Copy Block 2</button>
      <span id="finalize-copy-status" style="text-align:center;font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--teal);min-height:1em;flex-shrink:0"></span>
    `;
    document.body.appendChild(modal);
  }

  document.getElementById('finalize-b1').value = block1Lines.join('\n');
  document.getElementById('finalize-b2').value = block2Lines.join('\n');
  modal.style.display = 'flex';
}

function copyFinalizeBlock(n) {
  const ta = document.getElementById(`finalize-b${n}`);
  const text = ta.value;
  const s = document.getElementById('finalize-copy-status');
  const cell = n === 1 ? 'N2' : 'A8';
  const done = () => {
    s.textContent = `✓ Copied — select ${cell} in Numbers and paste`;
    setTimeout(() => s.textContent = '', 3000);
  };
  if (navigator.clipboard && window.ClipboardItem) {
    const item = new ClipboardItem({
      'text/plain': new Blob([text], { type: 'text/plain' }),
    });
    navigator.clipboard.write([item]).then(done).catch(() => execCopy(ta, s, cell));
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => execCopy(ta, s, cell));
  } else {
    execCopy(ta, s, cell);
  }
}

function execCopy(ta, statusEl, cell) {
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    statusEl.textContent = `✓ Copied — select ${cell} in Numbers and paste`;
  } catch(e) {
    statusEl.textContent = 'Long-press text → Select All → Copy';
  }
  setTimeout(() => statusEl.textContent = '', 3000);
}

function importSchedule() {
  const raw    = document.getElementById('schedule-input').value.trim();

  // ── Parse crew/aircraft/date from email header ──────────
  const matchLine = (pat) => { const m = raw.match(pat); return m ? m[1].trim() : ''; };
  // Captain: "Hachman, Kaylia" → last, first
  const captRaw = matchLine(/Captain:\s*(.+)/i);
  const foRaw   = matchLine(/First Officer:\s*(.+)/i);
  const acRaw   = matchLine(/Aircraft:\s*(C[A-Z0-9]{4})/i);
  // Date from "Date	03/06/2026" or "Date  03/06/2026"
  const dateRaw = matchLine(/^Date[\t\s]+([\d\/]+)/im);
  const dutyStartRaw = matchLine(/Duty Start[^\t\n]*[\t\s]+(\d{2}:\d{2})\s*Z/i);
  const dutyStopRaw  = matchLine(/Duty Stop[^\t\n]*[\t\s]+(\d{2}:\d{2})\s*Z/im);
  // Format name: "Last, First" → "First Last"
  const fmtName = s => { if (!s) return ''; const p = s.split(','); return p.length===2 ? p[1].trim()+' '+p[0].trim() : s; };
  // Format date: "03/06/2026" → "06 March 2026"
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const fmtDate = s => { if (!s) return ''; const p = s.split('/'); if(p.length<3) return s; return p[1].replace(/^0/,'')+' '+months[parseInt(p[0])-1]+' '+p[2]; };
  // Parse raw date into a UTC midnight Date object for hIdx calculations
  // dateRaw format: "MM/DD/YYYY"
  let scheduleDate = null;
  if (dateRaw) {
    const dp = dateRaw.split('/');
    if (dp.length === 3) {
      scheduleDate = new Date(Date.UTC(parseInt(dp[2]), parseInt(dp[0])-1, parseInt(dp[1]), 0, 0, 0, 0));
      if (isNaN(scheduleDate.getTime())) scheduleDate = null;
    }
  }
  crewInfo = {
    captain: fmtName(captRaw),
    fo: fmtName(foRaw),
    aircraft: acRaw,
    date: fmtDate(dateRaw),
    scheduleDate,          // Date object at UTC midnight of the schedule day
    dutyStart: dutyStartRaw,
    dutyStop: dutyStopRaw,
  };
  const status = document.getElementById('import-status');
  if (!raw) { status.textContent = 'Nothing to import.'; return; }

  const normalizeIcao = t => {
    t = t.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (!t) return '';
    if (t.length === 3) return 'C' + t;  // YQT → CYQT, YAT → CYAT
    return t;
  };

  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const legs  = [];

  for (const line of lines) {
    // Normalize all whitespace variants (tabs, nbsp, en-space, etc.) to a pipe, then split
    const norm = line
      .replace(/[\t\u00a0\u2000-\u200b\u202f\u205f\u3000]+/g, '|')
      .replace(/  +/g, '|');
    let cols = norm.split('|').map(c => c.trim()).filter(Boolean);
    if (cols.length < 3) cols = line.trim().split(/\s+/);
    if (cols.length < 3) continue;

    // Skip header row
    const first = cols[0].toUpperCase().replace(/[^A-Z]/g, '');
    if (['ORIGIN','FROM','DEP','ORIG','SOURCE','DEPARTURE'].includes(first)) continue;

    const origin  = normalizeIcao(cols[0]);
    const dest    = normalizeIcao(cols[1]);
    if (!origin || !dest) continue;

    const depRaw  = cols[2].replace(/[^0-9:]/g, '');
    if (!/^\d{1,2}:\d{2}$/.test(depRaw)) continue;
    const [hh, mm] = depRaw.split(':');
    const normTime = String(parseInt(hh)).padStart(2,'0') + ':' + mm;

    legs.push({ origin, dest, depTime: normTime });
  }

  if (!legs.length) {
    status.textContent = '⚠ No valid legs found. Check format.';
    return;
  }

  // Build ordered stop list
  const stops = [legs[0].origin];
  for (const leg of legs) {
    if (stops[stops.length - 1] !== leg.origin) stops.push(leg.origin);
    stops.push(leg.dest);
  }

  document.getElementById('route-input').value = stops.join(' ');

  route      = parseRoute(stops.join(' '));
  legAltFt    = route.slice(0, -1).map((_, i) => legAltManual[i] ? legAltFt[i] : undefined);
  legExpanded  = route.slice(0, -1).map((_, i) => legExpanded[i]  ?? false);
  legAltManual  = route.slice(0, -1).map((_, i) => legAltManual[i] ?? false);
  legPax        = route.slice(0, -1).map((_, i) => legPax[i] ?? true);
  legMidKeys    = route.slice(0, -1).map((_, i) => legMidKeys[i] ?? []);
  legDepTime = legs.map(l => l.depTime);
  while (legDepTime.length < route.length - 1) legDepTime.push(null);

  status.textContent = `✓ ${legs.length} leg${legs.length>1?'s':''} imported`;

  document.getElementById('import-panel').style.display = 'none';
  document.getElementById('import-toggle').textContent = '＋ Import schedule';

  handleGo();
}

// ── Go! ────────────────────────────────────────────────────
async function handleGo() {
  const raw = document.getElementById('route-input').value;
  if (!raw.trim()) return;

  const prevRoute    = route;
  route              = parseRoute(raw);
  const legs         = route.length - 1;
  legAltFt           = Array.from({length: legs}, (_, i) => legAltManual[i] ? legAltFt[i] : undefined);
  legDepTime         = Array.from({length: legs}, (_, i) => legDepTime[i]  ?? null);
  legExpanded        = Array.from({length: legs}, (_, i) => legExpanded[i] ?? false);
  legAltManual       = Array.from({length: legs}, (_, i) => legAltManual[i] ?? false);
  legPax             = Array.from({length: legs}, (_, i) => legPax[i] ?? true);
  legMidKeys         = Array.from({length: legs}, (_, i) => legMidKeys[i] ?? []);

  renderLegs();

  const btn = document.getElementById('go-btn');
  btn.classList.add('loading');

  const validAps = route.filter(w => !w.error);
  await Promise.allSettled(validAps.map(async ap => {
    try { await fetchAirport(ap); }
    catch(e) { cache[ap.icao] = { error: e.message }; }
    renderLegs();
  }));

  // Fetch midpoints for long legs (>150 nm), one point every 100 nm
  const midFetches = [];
  for (let li = 0; li < route.length - 1; li++) {
    const dep = route[li], arr = route[li + 1];
    if (dep.error || arr.error) continue;
    const d = Math.round(distNm(dep.lat, dep.lon, arr.lat, arr.lon));
    midFetches.push(fetchLegMidpoints(li, dep, arr, d));
  }
  if (midFetches.length) {
    await Promise.allSettled(midFetches);
    renderLegs();
  }

  btn.classList.remove('loading');
  saveSession();
}

document.getElementById('route-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleGo();
});

// ── Restore session on page load ─────────────────────────
loadSession();
</script>
